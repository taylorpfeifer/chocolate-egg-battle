// --- Game State ---

// --- Input ---
const keys_pressed = {};
window.addEventListener('keydown', e => {
  keys_pressed[e.code] = true;
  if (gameState === 'START') {
    startGame();
    e.preventDefault();
  }
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys_pressed[e.code] = false; });

// --- Touch Input System ---
let touchJoystick = { active: false, id: null, cx: 0, cy: 0, dx: 0, dy: 0 };
let touchPoopBtn = { active: false, id: null };
let touchMoveX = 0, touchMoveY = 0;
let touchPoopPressed = false;

function getJoystickCenter() {
  return { x: JOYSTICK_RADIUS + 40, y: canvas.height - CONTROL_ZONE_HEIGHT / 2 };
}
function getPoopBtnCenter() {
  return { x: canvas.width - POOP_BTN_RADIUS - 40, y: canvas.height - CONTROL_ZONE_HEIGHT / 2 };
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'START') { startGame(); return; }

  for (const touch of e.changedTouches) {
    const tx = touch.clientX;
    const ty = touch.clientY;
    const joy = getJoystickCenter();
    const btn = getPoopBtnCenter();

    // Check poop button first
    if (Math.hypot(tx - btn.x, ty - btn.y) < POOP_BTN_RADIUS * 2) {
      touchPoopBtn.active = true;
      touchPoopBtn.id = touch.identifier;
      touchPoopPressed = true;
    }
    // Check joystick zone (left half of screen)
    else if (tx < canvas.width / 2) {
      touchJoystick.active = true;
      touchJoystick.id = touch.identifier;
      touchJoystick.cx = tx;
      touchJoystick.cy = ty;
      touchJoystick.dx = 0;
      touchJoystick.dy = 0;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touchJoystick.active && touch.identifier === touchJoystick.id) {
      const dx = touch.clientX - touchJoystick.cx;
      const dy = touch.clientY - touchJoystick.cy;
      const dist = Math.hypot(dx, dy);
      const maxDist = JOYSTICK_RADIUS;
      if (dist > maxDist) {
        touchJoystick.dx = (dx / dist) * maxDist;
        touchJoystick.dy = (dy / dist) * maxDist;
      } else {
        touchJoystick.dx = dx;
        touchJoystick.dy = dy;
      }
      // Convert to -1..1 range
      touchMoveX = touchJoystick.dx / maxDist;
      touchMoveY = touchJoystick.dy / maxDist;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    if (touchJoystick.active && touch.identifier === touchJoystick.id) {
      touchJoystick.active = false;
      touchJoystick.id = null;
      touchMoveX = 0;
      touchMoveY = 0;
    }
    if (touchPoopBtn.active && touch.identifier === touchPoopBtn.id) {
      touchPoopBtn.active = false;
      touchPoopBtn.id = null;
    }
  }

  // Handle game over restart via touch
  if (gameState === 'GAME_OVER') {
    // Handled by the restart listener
  }
}, { passive: false });

canvas.addEventListener('touchcancel', e => {

  touchMoveX = 0;
  touchMoveY = 0;
  touchPoopBtn.active = false;

}, { passive: false });

// --- Audio System ---
let audioCtx = null;
function initAudio() {
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function playSound(type) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    switch(type) {
      case 'collect':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(1320, now + 0.08);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        break;
      case 'golden':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.exponentialRampToValueAtTime(1320, now + 0.1);
        osc.frequency.exponentialRampToValueAtTime(1760, now + 0.2);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
        break;
      case 'steal':
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        break;
      case 'rotten':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc.start(now); osc.stop(now + 0.35);
        break;
      case 'poop':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
        break;
      case 'fanfare':
        [0, 0.15, 0.3, 0.5].forEach((delay, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = 'sine';
          const freqs = [523, 659, 784, 1047];
          o.frequency.setValueAtTime(freqs[i], now + delay);
          g.gain.setValueAtTime(0.15, now + delay);
          g.gain.exponentialRampToValueAtTime(0.001, now + delay + (i === 3 ? 0.5 : 0.2));
          o.start(now + delay); o.stop(now + delay + (i === 3 ? 0.5 : 0.2));
        });
        break;
    }
  } catch(e) {}
}

// --- Particle System ---
const particles = [];
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 120 + Math.random() * 180;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: 3 + Math.random() * 3,
      color,
      life: 0.4 + Math.random() * 0.3,
      maxLife: 0.4 + Math.random() * 0.3
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Player ---
class Player {
  constructor() {
    this.color = '#4A90D9';
    this.earColor = '#FFB6C1';
    this.x = 0;
    this.y = 0;
    this.vx = 0;
    this.vy = 0;
    this.facingX = 1;
    this.facingY = 0;
    this.score = 0;
    this.eggs = { milk: 0, dark: 0, golden: 0 };
    this.freezeTimer = 0;
    this.speedBoostTimer = 0;
    this.poopCooldown = 0;
    this.poopsRemaining = POOP_MAX;
  }

  get totalEggs() {
    return this.eggs.milk + this.eggs.dark + this.eggs.golden;
  }

  reset(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.score = 0;
    this.eggs = { milk: 0, dark: 0, golden: 0 };
    this.freezeTimer = 0;
    this.speedBoostTimer = 0;
    this.poopCooldown = 0;
    this.poopsRemaining = POOP_MAX;
  }

  update(dt) {
    if (this.freezeTimer > 0) this.freezeTimer -= dt;
    if (this.speedBoostTimer > 0) this.speedBoostTimer -= dt;
    if (this.poopCooldown > 0) {
      this.poopCooldown -= dt;
      if (this.poopCooldown <= 0) {
        this.poopsRemaining = POOP_MAX;
      }
    }

    if (this.freezeTimer > 0) {
      this.vx = 0; this.vy = 0;
      return;
    }

    let mx = 0, my = 0;
    // Keyboard input
    if (keys_pressed['ArrowLeft']) mx -= 1;
    if (keys_pressed['ArrowRight']) mx += 1;
    if (keys_pressed['ArrowUp']) my -= 1;
    if (keys_pressed['ArrowDown']) my += 1;
    // Touch joystick input (overrides keyboard if active)
    if (touchJoystick.active) {
      mx = touchMoveX;
      my = touchMoveY;
      // Apply deadzone
      const mag = Math.hypot(mx, my);
      if (mag < 0.15) { mx = 0; my = 0; }
    }

    if (mx !== 0 && my !== 0) {
      const mag = Math.hypot(mx, my);
      if (mag > 1) { mx /= mag; my /= mag; }
    }
    if (mx !== 0 || my !== 0) { this.facingX = mx; this.facingY = my; }

    let speed = BASE_SPEED;
    if (this.speedBoostTimer > 0) speed *= (1 + SPEED_BOOST_AMOUNT);

    this.vx = mx * speed;
    this.vy = my * speed;

    // Poop input (keyboard or touch)
    const poopInput = keys_pressed['Space'] || touchPoopPressed;
    if (poopInput && this.poopsRemaining > 0 && this.poopCooldown <= 0) {
      keys_pressed['Space'] = false;
      touchPoopPressed = false;
      poops.push(new Poop(this.x, this.y));
      this.poopsRemaining--;
      playSound('poop');
      if (this.poopsRemaining <= 0) {
        this.poopCooldown = POOP_COOLDOWN;
      }
    }
    if (touchPoopPressed) touchPoopPressed = false; // consume even if couldn't poop

    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Arena bounds (reserve bottom for touch controls on mobile)
    const minX = ARENA_PADDING + PLAYER_RADIUS;
    const maxX = canvas.width - ARENA_PADDING - PLAYER_RADIUS;
    const minY = ARENA_PADDING + PLAYER_RADIUS + 50;
    const bottomReserve = IS_TOUCH ? CONTROL_ZONE_HEIGHT : 0;
    const maxY = canvas.height - ARENA_PADDING - PLAYER_RADIUS - bottomReserve;
    if (this.x < minX) { this.x = minX; this.vx = 0; }
    if (this.x > maxX) { this.x = maxX; this.vx = 0; }
    if (this.y < minY) { this.y = minY; this.vy = 0; }
    if (this.y > maxY) { this.y = maxY; this.vy = 0; }
  }

  draw() {

    const r = PLAYER_RADIUS;

    // Speed boost glow
    if (this.speedBoostTimer > 0) {
      const glow = ctx.createRadialGradient(this.x, this.y, r, this.x, this.y, r * 2);
      glow.addColorStop(0, 'rgba(255, 215, 0, 0.3)');
      glow.addColorStop(1, 'rgba(255, 215, 0, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    const bodyColor = this.freezeTimer > 0 ? '#66BB6A' : this.color;

    // Body
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Bunny ears
    const earLen = r * 1.4;
    const earW = r * 0.35;
    const earSpread = 0.35;
    for (let side = -1; side <= 1; side += 2) {
      ctx.save();
      ctx.translate(this.x, this.y);
      const baseAngle = Math.atan2(this.facingY, this.facingX) - Math.PI / 2;
      ctx.rotate(baseAngle + side * earSpread);
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, -r - earLen / 2, earW, earLen / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = this.earColor;
      ctx.beginPath();
      ctx.ellipse(0, -r - earLen / 2, earW * 0.55, earLen * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Eyes
    const eyeAngle = Math.atan2(this.facingY, this.facingX);
    const eyeDist = r * 0.45;
    const eyePerp = Math.PI / 2;
    for (let side = -1; side <= 1; side += 2) {
      const ex = this.x + Math.cos(eyeAngle) * eyeDist + Math.cos(eyeAngle + eyePerp * side) * (r * 0.3);
      const ey = this.y + Math.sin(eyeAngle) * eyeDist + Math.sin(eyeAngle + eyePerp * side) * (r * 0.3);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex, ey, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(ex + Math.cos(eyeAngle) * 1.5, ey + Math.sin(eyeAngle) * 1.5, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Freeze indicator
    if (this.freezeTimer > 0) {
      ctx.strokeStyle = '#4CAF50';
      ctx.lineWidth = 3;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(this.x, this.y, r + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

  }
}

// --- Poop Class ---
class Poop {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.life = POOP_LIFETIME;
    this.maxLife = POOP_LIFETIME;
  }

  update(dt) {
    this.life -= dt;
  }

  draw(time) {
    const fade = Math.min(1, this.life / 2); // fade out in last 2 seconds
    ctx.globalAlpha = fade * 0.85;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(this.x, this.y + POOP_RADIUS * 0.6, POOP_RADIUS * 0.7, POOP_RADIUS * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Poop pile — 3 stacked lumps
    const r = POOP_RADIUS;
    ctx.fillStyle = '#6D4C41';
    // Bottom lump
    ctx.beginPath();
    ctx.ellipse(this.x, this.y + r * 0.2, r * 0.7, r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Middle lump
    ctx.beginPath();
    ctx.ellipse(this.x, this.y - r * 0.15, r * 0.5, r * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // Top lump
    ctx.beginPath();
    ctx.ellipse(this.x, this.y - r * 0.45, r * 0.3, r * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.ellipse(this.x - r * 0.15, this.y - r * 0.5, r * 0.12, r * 0.1, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Stink lines
    ctx.strokeStyle = `rgba(139, 119, 42, ${fade * 0.4})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const sx = this.x - 6 + i * 6;
      const waveOff = Math.sin(time * 3 + i * 2.5) * 3;
      ctx.beginPath();
      ctx.moveTo(sx, this.y - r * 0.7);
      ctx.quadraticCurveTo(sx + waveOff, this.y - r * 1.2, sx, this.y - r * 1.7);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
  }
}

// --- AI Thief Bunny ---
class AIBunny {
  constructor(color, earColor) {
    this.color = color;
    this.earColor = earColor;
    this.x = 0;
    this.y = 0;
    this.vx = 0;
    this.vy = 0;
    this.facingX = 1;
    this.facingY = 0;
    this.state = 'WANDER'; // WANDER, SEEK_EGG, FLEE
    this.stateTimer = 0;
    this.wanderDirX = 0;
    this.wanderDirY = 0;
    this.dashCooldown = 0;
    this.isDashing = false;
    this.dashTimer = 0;
    this.freezeTimer = 0;
    this.slowTimer = 0;
    this.stealCooldown = 8 + Math.random() * 4;
    this.dashTrail = [];
  }

  reset() {
    this.x = ARENA_PADDING + AI_RADIUS + Math.random() * (canvas.width - ARENA_PADDING * 2 - AI_RADIUS * 2);
    this.y = ARENA_PADDING + 50 + AI_RADIUS + Math.random() * (canvas.height - ARENA_PADDING * 2 - 50 - AI_RADIUS * 2);
    this.vx = 0; this.vy = 0;
    this.state = 'WANDER';
    this.stateTimer = 0;
    this.dashCooldown = 5 + Math.random() * 3;
    this.isDashing = false;
    this.dashTimer = 0;
    this.freezeTimer = 0;
    this.slowTimer = 0;
    this.stealCooldown = 8 + Math.random() * 4;
    this.dashTrail = [];
    this.pickWanderDir();
  }

  pickWanderDir() {
    const angle = Math.random() * Math.PI * 2;
    this.wanderDirX = Math.cos(angle);
    this.wanderDirY = Math.sin(angle);
    this.stateTimer = 1 + Math.random() * 1.5;
  }

  update(dt, player, eggs, gameProgress) {
    if (this.dashCooldown > 0) this.dashCooldown -= dt;
    if (this.freezeTimer > 0) this.freezeTimer -= dt;
    if (this.slowTimer > 0) this.slowTimer -= dt;
    if (this.stealCooldown > 0) this.stealCooldown -= dt;
    if (this.dashTimer > 0) {
      this.dashTimer -= dt;
      if (this.dashTimer <= 0) this.isDashing = false;
    }

    if (this.freezeTimer > 0) {
      this.vx = 0; this.vy = 0;
      return;
    }

    // AI speed ramps from 70% to 90% of player base speed
    let aiSpeed = BASE_SPEED * (0.6 + 0.2 * gameProgress);
    if (this.slowTimer > 0) aiSpeed *= POOP_SLOW_FACTOR;

    // Decide state
    const distToPlayer = Math.hypot(this.x - player.x, this.y - player.y);

    // Try to steal if close to player and cooldown ready
    if (this.stealCooldown <= 0 && distToPlayer < 120 && player.totalEggs > 0 && this.dashCooldown <= 0) {
      // Dash toward player to steal
      this.isDashing = true;
      this.dashTimer = DASH_DURATION;
      this.dashCooldown = 5;
      this.stealCooldown = 10 + Math.random() * 5;
      const angle = Math.atan2(player.y - this.y, player.x - this.x);
      this.facingX = Math.cos(angle);
      this.facingY = Math.sin(angle);
      this.vx = this.facingX * aiSpeed * DASH_MULTIPLIER;
      this.vy = this.facingY * aiSpeed * DASH_MULTIPLIER;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.clampBounds();
      if (this.isDashing) this.dashTrail.push({ x: this.x, y: this.y, life: 0.2 });
      this.updateTrail(dt);
      return;
    }
    else {
      // Find nearest egg
      let nearestEgg = null;
      let nearestDist = 400;
      for (const egg of eggs) {
        if (egg.type === 'rotten' || egg.type === 'grass') continue; // AI avoids rotten eggs and grass
        const d = Math.hypot(this.x - egg.x, this.y - egg.y);
        if (d < nearestDist) {
          nearestDist = d;
          nearestEgg = egg;
        }
      }
      if (nearestEgg) {
        this.state = 'SEEK_EGG';
        const angle = Math.atan2(nearestEgg.y - this.y, nearestEgg.x - this.x);
        this.wanderDirX = Math.cos(angle);
        this.wanderDirY = Math.sin(angle);
      } else if (this.state !== 'WANDER' || this.stateTimer <= 0) {
        this.state = 'WANDER';
        this.pickWanderDir();
      }
    }

    this.stateTimer -= dt;
    if (this.state === 'WANDER' && this.stateTimer <= 0) {
      this.pickWanderDir();
    }

    let mx = this.wanderDirX;
    let my = this.wanderDirY;

    if (this.state === 'FLEE') {
      const angle = Math.atan2(this.y - player.y, this.x - player.x);
      mx = Math.cos(angle);
      my = Math.sin(angle);
    }

    if (mx !== 0 || my !== 0) {
      this.facingX = mx;
      this.facingY = my;
    }

    let speed = aiSpeed;
    if (this.isDashing) speed *= DASH_MULTIPLIER;

    this.vx = mx * speed;
    this.vy = my * speed;
    this.x += this.vx * dt;
    this.y += this.vy * dt;

    this.clampBounds();

    if (this.isDashing) {
      this.dashTrail.push({ x: this.x, y: this.y, life: 0.2 });
    }
    this.updateTrail(dt);
  }

  clampBounds() {
    const minX = ARENA_PADDING + AI_RADIUS;
    const maxX = canvas.width - ARENA_PADDING - AI_RADIUS;
    const minY = ARENA_PADDING + AI_RADIUS + 50;
    const bottomReserve = IS_TOUCH ? CONTROL_ZONE_HEIGHT : 0;
    const maxY = canvas.height - ARENA_PADDING - AI_RADIUS - bottomReserve;
    if (this.x < minX) { this.x = minX; this.vx = 0; this.pickWanderDir(); }
    if (this.x > maxX) { this.x = maxX; this.vx = 0; this.pickWanderDir(); }
    if (this.y < minY) { this.y = minY; this.vy = 0; this.pickWanderDir(); }
    if (this.y > maxY) { this.y = maxY; this.vy = 0; this.pickWanderDir(); }
  }

  updateTrail(dt) {
    for (let i = this.dashTrail.length - 1; i >= 0; i--) {
      this.dashTrail[i].life -= dt;
      if (this.dashTrail[i].life <= 0) this.dashTrail.splice(i, 1);
    }
  }

  draw() {
    // Dash trail
    for (const t of this.dashTrail) {
      const alpha = t.life / 0.2 * 0.3;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, AI_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    const r = AI_RADIUS;
    const bodyColor = this.freezeTimer > 0 ? '#66BB6A' : this.color;

    // Body
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Smaller bunny ears
    const earLen = r * 1.2;
    const earW = r * 0.3;
    const earSpread = 0.35;
    for (let side = -1; side <= 1; side += 2) {
      ctx.save();
      ctx.translate(this.x, this.y);
      const baseAngle = Math.atan2(this.facingY, this.facingX) - Math.PI / 2;
      ctx.rotate(baseAngle + side * earSpread);
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, -r - earLen / 2, earW, earLen / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = this.earColor;
      ctx.beginPath();
      ctx.ellipse(0, -r - earLen / 2, earW * 0.5, earLen * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Eyes (smaller)
    const eyeAngle = Math.atan2(this.facingY, this.facingX);
    const eyeDist = r * 0.4;
    const eyePerp = Math.PI / 2;
    for (let side = -1; side <= 1; side += 2) {
      const ex = this.x + Math.cos(eyeAngle) * eyeDist + Math.cos(eyeAngle + eyePerp * side) * (r * 0.28);
      const ey = this.y + Math.sin(eyeAngle) * eyeDist + Math.sin(eyeAngle + eyePerp * side) * (r * 0.28);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex, ey, 3.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(ex + Math.cos(eyeAngle) * 1, ey + Math.sin(eyeAngle) * 1, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }

    // Freeze indicator
    if (this.freezeTimer > 0) {
      ctx.strokeStyle = '#4CAF50';
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(this.x, this.y, r + 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Slow indicator (brown swirl)
    if (this.slowTimer > 0) {
      ctx.strokeStyle = 'rgba(109, 76, 65, 0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([2, 4]);
      ctx.beginPath();
      ctx.arc(this.x, this.y, r + 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

// --- Egg ---
class Egg {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type;
    this.props = EGG_TYPES[type];
    this.radius = EGG_RADIUS;
    this.spawnScale = 0;
    this.bobOffset = Math.random() * Math.PI * 2;
    this.collected = false;
  }

  update(dt) {
    if (this.spawnScale < 1) {
      this.spawnScale = Math.min(1, this.spawnScale + dt * 4);
    }
  }

  draw(time) {
    const scale = this.spawnScale;
    const r = this.radius * scale;
    if (r <= 0) return;

    const bob = Math.sin(time * 3 + this.bobOffset) * 2;

    ctx.save();
    ctx.translate(this.x, this.y + bob);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, r + 2, r * 0.8, r * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();

    // Egg shape
    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
    grad.addColorStop(0, this.props.highlight);
    grad.addColorStop(1, this.props.color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.85, r, 0, 0, Math.PI * 2);
    ctx.fill();

    // Shine spot
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(-r * 0.25, -r * 0.3, r * 0.2, r * 0.15, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Golden sparkle
    if (this.type === 'golden') {
      const sparkle = Math.sin(time * 8 + this.bobOffset) * 0.5 + 0.5;
      ctx.strokeStyle = `rgba(255, 215, 0, ${sparkle * 0.8})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, r + 3 + sparkle * 3, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Rotten stink lines
    if (this.type === 'rotten') {
      ctx.strokeStyle = 'rgba(76, 175, 80, 0.4)';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        const sx = -6 + i * 6;
        const waveOff = Math.sin(time * 4 + i * 2) * 3;
        ctx.beginPath();
        ctx.moveTo(sx, -r - 2);
        ctx.quadraticCurveTo(sx + waveOff, -r - 8, sx, -r - 14);
        ctx.stroke();
      }
    }

    // Grass patch — draw blades of grass instead of egg shape
    if (this.type === 'grass') {
      // Override: redraw as a grass patch
      // Clear the egg shape by drawing over with grass
      ctx.fillStyle = '#5D8A2F';
      ctx.beginPath();
      ctx.ellipse(0, r * 0.3, r * 1.1, r * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Grass blades
      const bladeCount = 7;
      for (let i = 0; i < bladeCount; i++) {
        const bx = -r * 0.8 + (i / (bladeCount - 1)) * r * 1.6;
        const bladeH = r * 0.8 + Math.sin(time * 2 + i * 1.3 + this.bobOffset) * r * 0.2;
        const sway = Math.sin(time * 2.5 + i * 0.8) * 2;
        ctx.strokeStyle = i % 2 === 0 ? '#7CB342' : '#9CCC65';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(bx, r * 0.1);
        ctx.quadraticCurveTo(bx + sway, -bladeH * 0.5, bx + sway * 0.5, -bladeH);
        ctx.stroke();
      }
    }

    ctx.restore();
  }
}

// --- Game Objects ---
let player, aiBunnies, eggs, poops;

function createObjects() {
  player = new Player();
  aiBunnies = [
    new AIBunny('#E74C3C', '#FFB6C1'),
    new AIBunny('#F39C12', '#FFE0B2'),
    new AIBunny('#9B59B6', '#E1BEE7'),
  ];
}

function resetGame() {
  eggs = [];
  poops = [];
  particles.length = 0;
  gameTimer = GAME_DURATION;
  spawnTimer = 0;
  shakeTimer = 0;
  flashAlpha = 0;
  player.reset(canvas.width * 0.5, canvas.height * 0.5);
  for (const ai of aiBunnies) ai.reset();
}

// --- Egg Spawning ---
function getRandomEggType() {
  const totalWeight = Object.values(EGG_TYPES).reduce((s, t) => s + t.weight, 0);
  let rand = Math.random() * totalWeight;
  for (const [type, props] of Object.entries(EGG_TYPES)) {
    rand -= props.weight;
    if (rand <= 0) return type;
  }
  return 'milk';
}

function spawnEgg() {
  const margin = ARENA_PADDING + EGG_RADIUS + 20;
  const topMargin = ARENA_PADDING + 50 + EGG_RADIUS + 20;
  const bottomReserve = IS_TOUCH ? CONTROL_ZONE_HEIGHT : 0;
  const x = margin + Math.random() * (canvas.width - margin * 2);
  const y = topMargin + Math.random() * (canvas.height - topMargin - margin - bottomReserve);
  eggs.push(new Egg(x, y, getRandomEggType()));
}

// --- Collision ---
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function checkCollisions() {
  const gameProgress = 1 - (gameTimer / GAME_DURATION);

  // Player ↔ Egg
  if (player.freezeTimer <= 0) {
    for (let i = eggs.length - 1; i >= 0; i--) {
      const egg = eggs[i];
      if (egg.collected) continue;
      if (dist(player, egg) < PLAYER_RADIUS + egg.radius * egg.spawnScale) {
        egg.collected = true;
        eggs.splice(i, 1);

        if (egg.type === 'rotten') {
          player.freezeTimer = FREEZE_DURATION;
          spawnParticles(egg.x, egg.y, '#4CAF50', 12);
          playSound('rotten');
        } else if (egg.type === 'grass') {
          // Grass reloads poops
          player.poopsRemaining = POOP_MAX;
          player.poopCooldown = 0;
          spawnParticles(egg.x, egg.y, '#7CB342', 10);
          playSound('golden');
        } else {
          player.eggs[egg.type]++;
          player.score += egg.props.points;
          spawnParticles(egg.x, egg.y, egg.props.color, 8);

          if (egg.type === 'golden') {
            player.speedBoostTimer = SPEED_BOOST_DURATION;
            playSound('golden');
          } else {
            playSound('collect');
          }
        }
      }
    }
  }

  // AI ↔ Egg
  for (const ai of aiBunnies) {
    if (ai.freezeTimer > 0) continue;
    for (let i = eggs.length - 1; i >= 0; i--) {
      const egg = eggs[i];
      if (egg.collected) continue;
      if (egg.type === 'grass') continue; // AI can't collect grass
      if (dist(ai, egg) < AI_RADIUS + egg.radius * egg.spawnScale) {
        egg.collected = true;
        eggs.splice(i, 1);

        if (egg.type === 'rotten') {
          ai.freezeTimer = FREEZE_DURATION;
          spawnParticles(egg.x, egg.y, '#4CAF50', 12);
          playSound('rotten');
        } else {
          // AI just denies the egg — small particle effect
          spawnParticles(egg.x, egg.y, ai.color, 5);
          playSound('collect');
        }
      }
    }
  }

  // AI ↔ Player (steal on AI dash)
  for (const ai of aiBunnies) {
    if (ai.isDashing && dist(ai, player) < AI_RADIUS + PLAYER_RADIUS) {
      // AI steals 1 egg from player
      if (player.totalEggs > 0) {
        const pool = [];
        for (const [type, count] of Object.entries(player.eggs)) {
          for (let i = 0; i < count; i++) pool.push(type);
        }
        const stolen = pool[Math.floor(Math.random() * pool.length)];
        player.eggs[stolen]--;
        player.score -= EGG_TYPES[stolen].points;

        shakeTimer = 0.15;
        shakeIntensity = 4;
        flashAlpha = 0.2;
        spawnParticles(
          (ai.x + player.x) / 2,
          (ai.y + player.y) / 2,
          '#fff', 10
        );
        playSound('steal');
      }

      // Push apart
      const angle = Math.atan2(player.y - ai.y, player.x - ai.x);
      player.x += Math.cos(angle) * 30;
      player.y += Math.sin(angle) * 30;
      ai.isDashing = false;
      ai.dashTimer = 0;
    }
  }

  // Poop ↔ AI (slows AI bunnies)
  for (const ai of aiBunnies) {
    for (let i = poops.length - 1; i >= 0; i--) {
      const poop = poops[i];
      if (dist(ai, poop) < AI_RADIUS + POOP_RADIUS) {
        ai.slowTimer = POOP_SLOW_DURATION;
        spawnParticles(poop.x, poop.y, '#6D4C41', 6);
        playSound('rotten');
        poops.splice(i, 1);
        break;
      }
    }
  }
}

// --- Drawing: LMNO Logo ---
function drawLogo() {
  // Calculate total width
  const pixelSize = Math.max(4, Math.min(8, canvas.width / 160));
  const gap = pixelSize; // gap between letters
  let totalWidth = 0;
  for (const letter of LOGO_LETTERS) {
    const grid = LOGO_PIXELS[letter.key];
    totalWidth += grid[0].length * pixelSize + letter.gap * pixelSize;
  }
  totalWidth -= LOGO_LETTERS[LOGO_LETTERS.length - 1].gap * pixelSize;

  const totalHeight = 16 * pixelSize;
  const startX = (canvas.width - totalWidth) / 2;
  const startY = (canvas.height + 50 - totalHeight) / 2; // account for HUD offset

  let cursorX = startX;

  for (const letter of LOGO_LETTERS) {
    const grid = LOGO_PIXELS[letter.key];
    const isDot = letter.key === 'dot';

    for (let row = 0; row < grid.length; row++) {
      for (let col = 0; col < grid[row].length; col++) {
        if (grid[row][col] === 1) {
          const px = cursorX + col * pixelSize;
          const py = startY + row * pixelSize;

          // Shadow (offset down-right)
          ctx.fillStyle = 'rgba(0,0,0,0.12)';
          ctx.fillRect(px + 2, py + 2, pixelSize - 1, pixelSize - 1);

          // Highlight (offset up-left)
          ctx.fillStyle = 'rgba(255,255,255,0.04)';
          ctx.fillRect(px - 1, py - 1, pixelSize - 1, pixelSize - 1);

          // Main pixel
          if (isDot) {
            // Red dot — muted vintage red
            ctx.fillStyle = 'rgba(139, 32, 32, 0.25)';
          } else {
            ctx.fillStyle = 'rgba(255,255,255,0.07)';
          }
          ctx.fillRect(px, py, pixelSize - 1, pixelSize - 1);
        }
      }
    }

    cursorX += grid[0].length * pixelSize + letter.gap * pixelSize;
  }
}

// --- Drawing: Arena Background ---
function drawArena() {
  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#2D1B4E');
  bg.addColorStop(1, '#1A0A2E');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Arena floor
  const floorGrad = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, 50,
    canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.6
  );
  floorGrad.addColorStop(0, '#3D2B5A');
  floorGrad.addColorStop(1, '#251545');
  ctx.fillStyle = floorGrad;

  const ap = ARENA_PADDING;
  const top = ap + 50;
  const bottomReserve = IS_TOUCH ? CONTROL_ZONE_HEIGHT : 0;
  const arenaH = canvas.height - top - ap - bottomReserve;
  const borderRadius = 20;
  ctx.beginPath();
  ctx.roundRect(ap, top, canvas.width - ap * 2, arenaH, borderRadius);
  ctx.fill();

  // Arena border
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(ap, top, canvas.width - ap * 2, arenaH, borderRadius);
  ctx.stroke();

  // Subtle grid pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = ap + gridSize; x < canvas.width - ap; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, top);
    ctx.lineTo(x, top + arenaH);
    ctx.stroke();
  }
  for (let y = top + gridSize; y < top + arenaH; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(ap, y);
    ctx.lineTo(canvas.width - ap, y);
    ctx.stroke();
  }

  // LMNO logo on the floor
  drawLogo();
}

// --- Drawing: HUD ---
function drawHUD(time) {
  drawPlayerHUD(player, 20, 8, time);

  // Timer — center
  const timerY = 35;
  const remaining = Math.max(0, Math.ceil(gameTimer));
  const minutes = Math.floor(remaining / 60);
  const seconds = remaining % 60;
  const timerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;

  let timerColor = '#fff';
  let timerSize = 32;
  if (gameTimer <= 10) {
    timerColor = '#FF4444';
    if (gameTimer <= 5) {
      timerSize = 32 + Math.sin(time * 10) * 4;
    }
  }

  ctx.font = `bold ${Math.round(timerSize)}px monospace`;
  ctx.fillStyle = timerColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(timerText, canvas.width / 2, timerY);
}

function drawPlayerHUD(p, x, y, time) {
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  // Label
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = p.color;
  ctx.fillText('SCORE', x, y);

  // Score
  ctx.font = 'bold 24px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`${p.score} pts`, x, y + 16);

  // Egg breakdown
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText(`${p.eggs.milk}m  ${p.eggs.dark}d  ${p.eggs.golden}g`, x, y + 40);

  // Poop indicator
  const barY = y + 54;
  const poopReady = p.poopsRemaining > 0 && p.poopCooldown <= 0;

  if (poopReady) {
    // Show poop count as small circles
    ctx.font = '9px monospace';
    ctx.fillStyle = '#6D4C41';
    ctx.fillText('POOP', x, barY);
    for (let i = 0; i < p.poopsRemaining; i++) {
      ctx.fillStyle = '#8D6E63';
      ctx.beginPath();
      ctx.arc(x + 35 + i * 12, barY + 3, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (p.poopCooldown > 0) {
    // Show cooldown bar
    const barW = 80;
    const barH = 4;
    const cooldownPct = p.poopCooldown / POOP_COOLDOWN;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x, barY, barW, barH);
    ctx.fillStyle = '#8D6E63';
    ctx.fillRect(x, barY, barW * (1 - cooldownPct), barH);
    ctx.font = '9px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('RELOADING...', x, barY + barH + 10);
  }
}

// --- Drawing: Screens ---
function drawStartLogo() {
  // Draw a larger, more visible version of the LMNO logo for the start screen
  const pixelSize = Math.max(3, Math.min(5, canvas.width / 200));
  let totalWidth = 0;
  for (const letter of LOGO_LETTERS) {
    const grid = LOGO_PIXELS[letter.key];
    totalWidth += grid[0].length * pixelSize + letter.gap * pixelSize;
  }
  totalWidth -= LOGO_LETTERS[LOGO_LETTERS.length - 1].gap * pixelSize;

  const totalHeight = 16 * pixelSize;
  const startX = (canvas.width - totalWidth) / 2;
  const startY = canvas.height - 60 - totalHeight;

  let cursorX = startX;
  for (const letter of LOGO_LETTERS) {
    const grid = LOGO_PIXELS[letter.key];
    const isDot = letter.key === 'dot';
    for (let row = 0; row < grid.length; row++) {
      for (let col = 0; col < grid[row].length; col++) {
        if (grid[row][col] === 1) {
          const px = cursorX + col * pixelSize;
          const py = startY + row * pixelSize;
          if (isDot) {
            ctx.fillStyle = 'rgba(200, 50, 50, 0.6)';
          } else {
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
          }
          ctx.fillRect(px, py, pixelSize - 1, pixelSize - 1);
        }
      }
    }
    cursorX += grid[0].length * pixelSize + letter.gap * pixelSize;
  }
}

function drawStartScreen(time) {
  drawArena();

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Title
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 52px monospace';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('CHOCOLATE EGG', cx, cy - 140);
  ctx.fillStyle = '#fff';
  ctx.fillText('HUNT', cx, cy - 85);

  // Subtitle
  ctx.font = '16px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('Solo Mode — Collect eggs, dodge thieves!', cx, cy - 50);

  // Controls
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#4A90D9';
  ctx.fillText('CONTROLS', cx, cy - 15);

  ctx.font = '12px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  if (IS_TOUCH) {
    ctx.fillText('Joystick (left) to move', cx, cy + 10);
    ctx.fillText('Poop button (right) slows thieves!', cx, cy + 27);
  } else {
    ctx.fillText('Arrow Keys to move', cx, cy + 10);
    ctx.fillText('SPACE to drop bunny poops (slows thieves!)', cx, cy + 27);
  }

  // Egg legend
  ctx.font = '11px monospace';
  const legendY = cy + 60;
  const types = [
    ['Milk (1pt)', EGG_TYPES.milk.color],
    ['Dark (3pt)', EGG_TYPES.dark.color],
    ['Golden (5pt+speed)', EGG_TYPES.golden.color],
    ['Rotten (freeze!)', EGG_TYPES.rotten.color],
    ['Grass (reload poop)', EGG_TYPES.grass.color]
  ];
  // Two rows for the legend
  const row1 = types.slice(0, 3);
  const row2 = types.slice(3);
  const legendSpacing = 180;

  // Row 1
  const row1StartX = cx - (row1.length - 1) * legendSpacing / 2;
  row1.forEach(([label, color], i) => {
    const lx = row1StartX + i * legendSpacing;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(lx - 35, legendY, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.textAlign = 'left';
    ctx.fillText(label, lx - 25, legendY + 4);
  });

  // Row 2
  const legendY2 = legendY + 20;
  const row2StartX = cx - (row2.length - 1) * legendSpacing / 2;
  row2.forEach(([label, color], i) => {
    const lx = row2StartX + i * legendSpacing;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(lx - 35, legendY2, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.textAlign = 'left';
    ctx.fillText(label, lx - 25, legendY2 + 4);
  });

  ctx.textAlign = 'center';

  // AI bunny warning
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('Watch out for thief bunnies — they steal your eggs!', cx, cy + 115);

  // Prompt
  const blink = Math.sin(time * 4) > 0;
  if (blink) {
    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(IS_TOUCH ? 'Tap to start!' : 'Press any key to start!', cx, cy + 150);
  }

  // LMNO logo at bottom
  drawStartLogo();
}

function getPerformanceRating(score) {
  if (score >= 80) return { text: 'Egg Master!', color: '#FFD700' };
  if (score >= 50) return { text: 'Great Collector!', color: '#4A90D9' };
  if (score >= 25) return { text: 'Not Bad!', color: '#81C784' };
  return { text: 'Keep Trying!', color: '#E74C3C' };
}

function drawGameOverScreen(time) {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Rating
  const rating = getPerformanceRating(player.score);
  ctx.font = 'bold 48px monospace';
  ctx.fillStyle = rating.color;
  ctx.fillText(rating.text, cx, cy - 100);

  // Final score
  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText(`${player.score}`, cx, cy - 30);
  ctx.font = '18px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('points', cx, cy + 10);

  // Egg breakdown
  ctx.font = '16px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(`Milk: ${player.eggs.milk}  |  Dark: ${player.eggs.dark}  |  Gold: ${player.eggs.golden}`, cx, cy + 50);
  ctx.fillText(`Total eggs: ${player.totalEggs}`, cx, cy + 75);

  // Play again
  const blink = Math.sin(time * 4) > 0;
  if (blink) {
    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(IS_TOUCH ? 'Tap to play again!' : 'Press any key to play again!', cx, cy + 130);
  }
}

// --- Game Flow ---
function startGame() {
  if (!audioCtx) initAudio();
  gameState = 'PLAYING';
  resetGame();
}

function endGame() {
  gameState = 'GAME_OVER';
  playSound('fanfare');

  for (const k in keys_pressed) keys_pressed[k] = false;
  setTimeout(() => {
    const restartHandler = (e) => {
      startGame();
      window.removeEventListener('keydown', restartHandler);
      canvas.removeEventListener('touchstart', touchRestartHandler);
    };
    const touchRestartHandler = (e) => {
      e.preventDefault();
      startGame();
      window.removeEventListener('keydown', restartHandler);
      canvas.removeEventListener('touchstart', touchRestartHandler);
    };
    window.addEventListener('keydown', restartHandler);
    canvas.addEventListener('touchstart', touchRestartHandler, { passive: false });
  }, 1000);
}

// --- Resize ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Drawing: Touch Controls ---
function drawTouchControls() {
  if (!IS_TOUCH) return;

  // Control zone background
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, canvas.height - CONTROL_ZONE_HEIGHT, canvas.width, CONTROL_ZONE_HEIGHT);

  // --- Virtual Joystick (left side) ---
  const joy = getJoystickCenter();

  // Outer ring
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(joy.x, joy.y, JOYSTICK_RADIUS, 0, Math.PI * 2);
  ctx.stroke();

  // Inner thumb
  let thumbX = joy.x;
  let thumbY = joy.y;
  let thumbAlpha = 0.2;
  if (touchJoystick.active) {
    thumbX = joy.x + touchJoystick.dx;
    thumbY = joy.y + touchJoystick.dy;
    // Re-center relative to actual touch position
    thumbX = touchJoystick.cx + touchJoystick.dx;
    thumbY = touchJoystick.cy + touchJoystick.dy;
    thumbAlpha = 0.5;
  }

  ctx.fillStyle = `rgba(74, 144, 217, ${thumbAlpha})`;
  ctx.beginPath();
  ctx.arc(thumbX, thumbY, JOYSTICK_THUMB_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Direction arrows on joystick
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '16px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (!touchJoystick.active) {
    ctx.fillText('▲', joy.x, joy.y - JOYSTICK_RADIUS * 0.55);
    ctx.fillText('▼', joy.x, joy.y + JOYSTICK_RADIUS * 0.55);
    ctx.fillText('◀', joy.x - JOYSTICK_RADIUS * 0.55, joy.y);
    ctx.fillText('▶', joy.x + JOYSTICK_RADIUS * 0.55, joy.y);
  }

  // --- Poop Button (right side) ---
  const btn = getPoopBtnCenter();
  const poopReady = player && player.poopsRemaining > 0 && player.poopCooldown <= 0;
  const btnAlpha = touchPoopBtn.active ? 0.6 : (poopReady ? 0.35 : 0.15);

  // Button circle
  ctx.fillStyle = poopReady ? `rgba(109, 76, 65, ${btnAlpha})` : `rgba(80, 80, 80, ${btnAlpha})`;
  ctx.beginPath();
  ctx.arc(btn.x, btn.y, POOP_BTN_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = poopReady ? 'rgba(139, 105, 80, 0.5)' : 'rgba(100,100,100,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Poop icon (small poop pile)
  ctx.fillStyle = poopReady ? '#8D6E63' : '#666';
  ctx.beginPath();
  ctx.ellipse(btn.x, btn.y + 4, 10, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(btn.x, btn.y - 3, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(btn.x, btn.y - 9, 4, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Count
  if (player) {
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (poopReady) {
      ctx.fillStyle = '#fff';
      ctx.fillText(`${player.poopsRemaining}`, btn.x, btn.y + POOP_BTN_RADIUS + 14);
    } else if (player.poopCooldown > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      const secs = Math.ceil(player.poopCooldown);
      ctx.fillText(`${secs}s`, btn.x, btn.y + POOP_BTN_RADIUS + 14);

      // Cooldown arc
      const pct = 1 - (player.poopCooldown / POOP_COOLDOWN);
      ctx.strokeStyle = '#8D6E63';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(btn.x, btn.y, POOP_BTN_RADIUS + 3, -Math.PI / 2, -Math.PI / 2 + pct * Math.PI * 2);
      ctx.stroke();
    }
  }
}

// --- Main Loop ---
createObjects();

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  const time = timestamp / 1000;
  const gameProgress = 1 - (gameTimer / GAME_DURATION);

  if (gameState === 'PLAYING') {
    gameTimer -= dt;
    if (gameTimer <= 0) {
      gameTimer = 0;
      endGame();
    }

    // Spawn eggs
    const spawnInterval = SPAWN_INTERVAL_START + (SPAWN_INTERVAL_END - SPAWN_INTERVAL_START) * gameProgress;
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEgg();
      spawnTimer = spawnInterval;
    }

    // Update
    player.update(dt);
    for (const ai of aiBunnies) ai.update(dt, player, eggs, gameProgress);
    for (const egg of eggs) egg.update(dt);
    // Update poops
    for (const poop of poops) poop.update(dt);
    for (let i = poops.length - 1; i >= 0; i--) {
      if (poops[i].life <= 0) poops.splice(i, 1);
    }
    checkCollisions();
    updateParticles(dt);

    if (shakeTimer > 0) shakeTimer -= dt;
    if (flashAlpha > 0) flashAlpha -= dt * 2;
  }

  // --- Draw ---
  ctx.save();

  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  if (gameState === 'START') {
    drawStartScreen(time);
  } else {
    drawArena();

    // Draw poops (under eggs and players)
    for (const poop of poops) poop.draw(time);

    for (const egg of eggs) egg.draw(time);
    drawParticles();

    // Draw AI bunnies
    for (const ai of aiBunnies) ai.draw();

    // Draw player (on top)
    player.draw();

    drawHUD(time);

    if (flashAlpha > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    if (gameState === 'GAME_OVER') {
      drawGameOverScreen(time);
    }

    // Touch controls always on top during gameplay
    drawTouchControls();
  }

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
