<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chocolate Egg Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0a2e; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// CHOCOLATE EGG BATTLE — 2-Player Local Multiplayer
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- Constants ---
const GAME_DURATION = 90;
const BASE_SPEED = 280;
const DASH_MULTIPLIER = 3.5;
const DASH_DURATION = 0.15;
const DASH_COOLDOWN = 3;
const FREEZE_DURATION = 3;
const SPEED_BOOST_DURATION = 4;
const SPEED_BOOST_AMOUNT = 1.0;
const PLAYER_RADIUS = 22;
const EGG_RADIUS = 12;
const ARENA_PADDING = 30;
const SPAWN_INTERVAL_START = 1.5;
const SPAWN_INTERVAL_END = 0.6;
const STEAL_COUNT_MIN = 1;
const STEAL_COUNT_MAX = 2;

// Egg types with weights and properties
const EGG_TYPES = {
  milk:   { color: '#8B5E3C', highlight: '#C4956A', points: 1, weight: 55, name: 'Milk' },
  dark:   { color: '#3E2723', highlight: '#6D4C41',  points: 3, weight: 25, name: 'Dark' },
  golden: { color: '#FFD700', highlight: '#FFF8DC',  points: 5, weight: 8,  name: 'Golden' },
  rotten: { color: '#4CAF50', highlight: '#81C784',  points: 0, weight: 12, name: 'Rotten' }
};

// --- Game State ---
let gameState = 'START'; // START, PLAYING, GAME_OVER
let gameTimer = GAME_DURATION;
let spawnTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let flashAlpha = 0;
let lastTime = 0;
let winner = null;

// --- Input ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (gameState === 'START') {
    startGame();
    e.preventDefault();
  }
  // Prevent scrolling with arrow keys / space
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// --- Audio System ---
let audioCtx = null;
function initAudio() {
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function playSound(type) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    switch(type) {
      case 'collect':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(1320, now + 0.08);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        break;
      case 'golden':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, now);
        osc.frequency.exponentialRampToValueAtTime(1320, now + 0.1);
        osc.frequency.exponentialRampToValueAtTime(1760, now + 0.2);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
        break;
      case 'steal':
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.2);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        break;
      case 'rotten':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc.start(now); osc.stop(now + 0.35);
        break;
      case 'fanfare':
        [0, 0.15, 0.3, 0.5].forEach((delay, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g); g.connect(audioCtx.destination);
          o.type = 'sine';
          const freqs = [523, 659, 784, 1047];
          o.frequency.setValueAtTime(freqs[i], now + delay);
          g.gain.setValueAtTime(0.15, now + delay);
          g.gain.exponentialRampToValueAtTime(0.001, now + delay + (i === 3 ? 0.5 : 0.2));
          o.start(now + delay); o.stop(now + delay + (i === 3 ? 0.5 : 0.2));
        });
        break;
    }
  } catch(e) {}
}

// --- Particle System ---
const particles = [];
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 120 + Math.random() * 180;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: 3 + Math.random() * 3,
      color,
      life: 0.4 + Math.random() * 0.3,
      maxLife: 0.4 + Math.random() * 0.3
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Player ---
class Player {
  constructor(id, color, earColor, controls) {
    this.id = id;
    this.color = color;
    this.earColor = earColor;
    this.controls = controls; // { up, down, left, right, dash }
    this.x = 0;
    this.y = 0;
    this.vx = 0;
    this.vy = 0;
    this.facingX = id === 1 ? 1 : -1;
    this.facingY = 0;
    this.score = 0;
    this.eggs = { milk: 0, dark: 0, golden: 0 };
    this.dashCooldown = 0;
    this.isDashing = false;
    this.dashTimer = 0;
    this.freezeTimer = 0;
    this.speedBoostTimer = 0;
    this.dashTrail = [];
  }

  reset(x, y) {
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.score = 0;
    this.eggs = { milk: 0, dark: 0, golden: 0 };
    this.dashCooldown = 0;
    this.isDashing = false;
    this.dashTimer = 0;
    this.freezeTimer = 0;
    this.speedBoostTimer = 0;
    this.dashTrail = [];
  }

  get totalEggs() {
    return this.eggs.milk + this.eggs.dark + this.eggs.golden;
  }

  update(dt) {
    // Timers
    if (this.dashCooldown > 0) this.dashCooldown -= dt;
    if (this.freezeTimer > 0) this.freezeTimer -= dt;
    if (this.speedBoostTimer > 0) this.speedBoostTimer -= dt;
    if (this.dashTimer > 0) {
      this.dashTimer -= dt;
      if (this.dashTimer <= 0) this.isDashing = false;
    }

    // Frozen — can't move
    if (this.freezeTimer > 0) {
      this.vx = 0;
      this.vy = 0;
      return;
    }

    // Movement input
    let mx = 0, my = 0;
    if (keys[this.controls.left])  mx -= 1;
    if (keys[this.controls.right]) mx += 1;
    if (keys[this.controls.up])    my -= 1;
    if (keys[this.controls.down])  my += 1;

    // Normalize diagonal
    if (mx !== 0 && my !== 0) {
      mx *= 0.7071;
      my *= 0.7071;
    }

    // Update facing direction
    if (mx !== 0 || my !== 0) {
      this.facingX = mx;
      this.facingY = my;
    }

    // Speed calculation
    let speed = BASE_SPEED;
    if (this.speedBoostTimer > 0) speed *= (1 + SPEED_BOOST_AMOUNT);
    if (this.isDashing) speed *= DASH_MULTIPLIER;

    this.vx = mx * speed;
    this.vy = my * speed;

    // Dash input
    if (keys[this.controls.dash] && this.dashCooldown <= 0 && !this.isDashing) {
      this.isDashing = true;
      this.dashTimer = DASH_DURATION;
      this.dashCooldown = DASH_COOLDOWN;
      // If not moving, dash in facing direction
      if (mx === 0 && my === 0) {
        this.vx = this.facingX * speed * DASH_MULTIPLIER;
        this.vy = this.facingY * speed * DASH_MULTIPLIER;
      }
    }

    // Apply movement
    this.x += this.vx * dt;
    this.y += this.vy * dt;

    // Arena bounds
    const minX = ARENA_PADDING + PLAYER_RADIUS;
    const maxX = canvas.width - ARENA_PADDING - PLAYER_RADIUS;
    const minY = ARENA_PADDING + PLAYER_RADIUS + 50; // leave room for HUD
    const maxY = canvas.height - ARENA_PADDING - PLAYER_RADIUS;
    if (this.x < minX) { this.x = minX; this.vx = 0; }
    if (this.x > maxX) { this.x = maxX; this.vx = 0; }
    if (this.y < minY) { this.y = minY; this.vy = 0; }
    if (this.y > maxY) { this.y = maxY; this.vy = 0; }

    // Dash trail
    if (this.isDashing) {
      this.dashTrail.push({ x: this.x, y: this.y, life: 0.2 });
    }
    for (let i = this.dashTrail.length - 1; i >= 0; i--) {
      this.dashTrail[i].life -= dt;
      if (this.dashTrail[i].life <= 0) this.dashTrail.splice(i, 1);
    }
  }

  draw() {
    // Dash trail
    for (const t of this.dashTrail) {
      const alpha = t.life / 0.2 * 0.3;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, PLAYER_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    const r = PLAYER_RADIUS;

    // Speed boost glow
    if (this.speedBoostTimer > 0) {
      const glow = ctx.createRadialGradient(this.x, this.y, r, this.x, this.y, r * 2);
      glow.addColorStop(0, 'rgba(255, 215, 0, 0.3)');
      glow.addColorStop(1, 'rgba(255, 215, 0, 0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Freeze tint
    const bodyColor = this.freezeTimer > 0 ? '#66BB6A' : this.color;

    // Body
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Bunny ears
    const earLen = r * 1.4;
    const earW = r * 0.35;
    const earSpread = 0.35;
    for (let side = -1; side <= 1; side += 2) {
      ctx.save();
      ctx.translate(this.x, this.y);
      const baseAngle = Math.atan2(this.facingY, this.facingX) - Math.PI / 2;
      ctx.rotate(baseAngle + side * earSpread);
      // Outer ear
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, -r - earLen / 2, earW, earLen / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Inner ear
      ctx.fillStyle = this.earColor;
      ctx.beginPath();
      ctx.ellipse(0, -r - earLen / 2, earW * 0.55, earLen * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Eyes
    const eyeAngle = Math.atan2(this.facingY, this.facingX);
    const eyeDist = r * 0.45;
    const eyePerp = Math.PI / 2;
    for (let side = -1; side <= 1; side += 2) {
      const ex = this.x + Math.cos(eyeAngle) * eyeDist + Math.cos(eyeAngle + eyePerp * side) * (r * 0.3);
      const ey = this.y + Math.sin(eyeAngle) * eyeDist + Math.sin(eyeAngle + eyePerp * side) * (r * 0.3);
      // White
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex, ey, 5, 0, Math.PI * 2);
      ctx.fill();
      // Pupil
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(ex + Math.cos(eyeAngle) * 1.5, ey + Math.sin(eyeAngle) * 1.5, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Freeze indicator
    if (this.freezeTimer > 0) {
      ctx.strokeStyle = '#4CAF50';
      ctx.lineWidth = 3;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(this.x, this.y, r + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Dash ready indicator (small dot under player)
    if (this.dashCooldown <= 0 && !this.isDashing) {
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.008) * 0.4;
      ctx.beginPath();
      ctx.arc(this.x, this.y + r + 8, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

// --- Egg ---
class Egg {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type;
    this.props = EGG_TYPES[type];
    this.radius = EGG_RADIUS;
    this.spawnScale = 0;
    this.bobOffset = Math.random() * Math.PI * 2;
    this.collected = false;
  }

  update(dt) {
    if (this.spawnScale < 1) {
      this.spawnScale = Math.min(1, this.spawnScale + dt * 4);
    }
  }

  draw(time) {
    const scale = this.spawnScale;
    const r = this.radius * scale;
    if (r <= 0) return;

    const bob = Math.sin(time * 3 + this.bobOffset) * 2;

    ctx.save();
    ctx.translate(this.x, this.y + bob);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, r + 2, r * 0.8, r * 0.25, 0, 0, Math.PI * 2);
    ctx.fill();

    // Egg shape (slightly oval)
    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
    grad.addColorStop(0, this.props.highlight);
    grad.addColorStop(1, this.props.color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.85, r, 0, 0, Math.PI * 2);
    ctx.fill();

    // Shine spot
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.ellipse(-r * 0.25, -r * 0.3, r * 0.2, r * 0.15, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // Golden sparkle
    if (this.type === 'golden') {
      const sparkle = Math.sin(time * 8 + this.bobOffset) * 0.5 + 0.5;
      ctx.strokeStyle = `rgba(255, 215, 0, ${sparkle * 0.8})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, r + 3 + sparkle * 3, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Rotten stink lines
    if (this.type === 'rotten') {
      ctx.strokeStyle = 'rgba(76, 175, 80, 0.4)';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        const sx = -6 + i * 6;
        const waveOff = Math.sin(time * 4 + i * 2) * 3;
        ctx.beginPath();
        ctx.moveTo(sx, -r - 2);
        ctx.quadraticCurveTo(sx + waveOff, -r - 8, sx, -r - 14);
        ctx.stroke();
      }
    }

    ctx.restore();
  }
}

// --- Game Objects ---
let player1, player2, eggs;

function createPlayers() {
  player1 = new Player(1, '#4A90D9', '#FFB6C1', {
    up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', dash: 'Space'
  });
  player2 = new Player(2, '#E74C3C', '#FFB6C1', {
    up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', dash: 'Enter'
  });
}

function resetGame() {
  eggs = [];
  particles.length = 0;
  gameTimer = GAME_DURATION;
  spawnTimer = 0;
  shakeTimer = 0;
  flashAlpha = 0;
  winner = null;
  player1.reset(canvas.width * 0.25, canvas.height * 0.5);
  player2.reset(canvas.width * 0.75, canvas.height * 0.5);
}

// --- Egg Spawning ---
function getRandomEggType() {
  const totalWeight = Object.values(EGG_TYPES).reduce((s, t) => s + t.weight, 0);
  let rand = Math.random() * totalWeight;
  for (const [type, props] of Object.entries(EGG_TYPES)) {
    rand -= props.weight;
    if (rand <= 0) return type;
  }
  return 'milk';
}

function spawnEgg() {
  const margin = ARENA_PADDING + EGG_RADIUS + 20;
  const topMargin = ARENA_PADDING + 50 + EGG_RADIUS + 20;
  const x = margin + Math.random() * (canvas.width - margin * 2);
  const y = topMargin + Math.random() * (canvas.height - topMargin - margin);
  eggs.push(new Egg(x, y, getRandomEggType()));
}

// --- Collision ---
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function checkCollisions() {
  // Player ↔ Egg
  for (const player of [player1, player2]) {
    if (player.freezeTimer > 0) continue;
    for (let i = eggs.length - 1; i >= 0; i--) {
      const egg = eggs[i];
      if (egg.collected) continue;
      if (dist(player, egg) < PLAYER_RADIUS + egg.radius * egg.spawnScale) {
        egg.collected = true;
        eggs.splice(i, 1);

        if (egg.type === 'rotten') {
          player.freezeTimer = FREEZE_DURATION;
          spawnParticles(egg.x, egg.y, '#4CAF50', 12);
          playSound('rotten');
        } else {
          player.eggs[egg.type]++;
          player.score += egg.props.points;
          spawnParticles(egg.x, egg.y, egg.props.color, 8);

          if (egg.type === 'golden') {
            player.speedBoostTimer = SPEED_BOOST_DURATION;
            playSound('golden');
          } else {
            playSound('collect');
          }
        }
      }
    }
  }

  // Player ↔ Player (steal on dash)
  if ((player1.isDashing || player2.isDashing) && dist(player1, player2) < PLAYER_RADIUS * 2) {
    const attacker = player1.isDashing ? player1 : player2;
    const victim = player2.isDashing && !player1.isDashing ? player1 : player2;
    // If both dashing, P1 gets priority (arbitrary but consistent)
    if (player1.isDashing && player2.isDashing) {
      // Both cancel out — no steal
      return;
    }

    const stealCount = Math.min(
      STEAL_COUNT_MIN + Math.floor(Math.random() * (STEAL_COUNT_MAX - STEAL_COUNT_MIN + 1)),
      victim.totalEggs
    );

    if (stealCount > 0) {
      // Build pool of stealable eggs
      const pool = [];
      for (const [type, count] of Object.entries(victim.eggs)) {
        for (let i = 0; i < count; i++) pool.push(type);
      }
      // Shuffle and steal
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      for (let i = 0; i < stealCount; i++) {
        const type = pool[i];
        victim.eggs[type]--;
        victim.score -= EGG_TYPES[type].points;
        attacker.eggs[type]++;
        attacker.score += EGG_TYPES[type].points;
      }

      // Effects
      shakeTimer = 0.2;
      shakeIntensity = 6;
      flashAlpha = 0.3;
      spawnParticles(
        (player1.x + player2.x) / 2,
        (player1.y + player2.y) / 2,
        '#fff', 15
      );
      playSound('steal');
    }

    // Push players apart
    const angle = Math.atan2(victim.y - attacker.y, victim.x - attacker.x);
    victim.x += Math.cos(angle) * 40;
    victim.y += Math.sin(angle) * 40;
    attacker.isDashing = false;
    attacker.dashTimer = 0;
  }
}

// --- Drawing: Arena Background ---
function drawArena() {
  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#2D1B4E');
  bg.addColorStop(1, '#1A0A2E');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Arena floor
  const floorGrad = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, 50,
    canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height) * 0.6
  );
  floorGrad.addColorStop(0, '#3D2B5A');
  floorGrad.addColorStop(1, '#251545');
  ctx.fillStyle = floorGrad;

  const ap = ARENA_PADDING;
  const top = ap + 50;
  const borderRadius = 20;
  ctx.beginPath();
  ctx.roundRect(ap, top, canvas.width - ap * 2, canvas.height - top - ap, borderRadius);
  ctx.fill();

  // Arena border
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(ap, top, canvas.width - ap * 2, canvas.height - top - ap, borderRadius);
  ctx.stroke();

  // Subtle grid pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 60;
  for (let x = ap + gridSize; x < canvas.width - ap; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, top);
    ctx.lineTo(x, canvas.height - ap);
    ctx.stroke();
  }
  for (let y = top + gridSize; y < canvas.height - ap; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(ap, y);
    ctx.lineTo(canvas.width - ap, y);
    ctx.stroke();
  }
}

// --- Drawing: HUD ---
function drawHUD(time) {
  // Player 1 score — top left
  drawPlayerHUD(player1, 20, 8, 'left', 'P1 — Blue Bunny', time);
  // Player 2 score — top right
  drawPlayerHUD(player2, canvas.width - 20, 8, 'right', 'P2 — Red Bunny', time);

  // Timer — center
  const timerY = 35;
  const remaining = Math.max(0, Math.ceil(gameTimer));
  const minutes = Math.floor(remaining / 60);
  const seconds = remaining % 60;
  const timerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;

  let timerColor = '#fff';
  let timerSize = 32;
  if (gameTimer <= 10) {
    timerColor = '#FF4444';
    if (gameTimer <= 5) {
      timerSize = 32 + Math.sin(time * 10) * 4;
    }
  }

  ctx.font = `bold ${Math.round(timerSize)}px monospace`;
  ctx.fillStyle = timerColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(timerText, canvas.width / 2, timerY);
}

function drawPlayerHUD(player, x, y, align, label, time) {
  ctx.textAlign = align;
  ctx.textBaseline = 'top';

  // Label
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = player.color;
  ctx.fillText(label, x, y);

  // Score
  ctx.font = 'bold 24px monospace';
  ctx.fillStyle = '#fff';
  const scoreText = `${player.score} pts`;
  ctx.fillText(scoreText, x, y + 16);

  // Egg breakdown
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const breakdown = `${player.eggs.milk}m  ${player.eggs.dark}d  ${player.eggs.golden}g`;
  ctx.fillText(breakdown, x, y + 40);

  // Dash cooldown bar
  const barW = 80;
  const barH = 4;
  const barX = align === 'left' ? x : x - barW;
  const barY = y + 54;
  const cooldownPct = Math.max(0, player.dashCooldown / DASH_COOLDOWN);

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(barX, barY, barW, barH);

  if (cooldownPct > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(barX, barY, barW * (1 - cooldownPct), barH);
  } else {
    ctx.fillStyle = player.color;
    ctx.fillRect(barX, barY, barW, barH);
  }

  // Dash label
  ctx.font = '9px monospace';
  ctx.fillStyle = cooldownPct <= 0 ? player.color : 'rgba(255,255,255,0.3)';
  ctx.fillText(cooldownPct <= 0 ? 'DASH READY' : 'DASH', barX + (align === 'left' ? 0 : barW), barY + barH + 10);
}

// --- Drawing: Screens ---
function drawStartScreen(time) {
  drawArena();

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Title
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 52px monospace';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('CHOCOLATE EGG', cx, cy - 120);
  ctx.fillStyle = '#fff';
  ctx.fillText('BATTLE', cx, cy - 65);

  // Subtitle
  ctx.font = '16px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('2-Player Local Multiplayer', cx, cy - 30);

  // Controls
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#4A90D9';
  ctx.fillText('PLAYER 1 (Blue Bunny)', cx - 160, cy + 20);
  ctx.fillStyle = '#E74C3C';
  ctx.fillText('PLAYER 2 (Red Bunny)', cx + 160, cy + 20);

  ctx.font = '12px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('WASD to move', cx - 160, cy + 45);
  ctx.fillText('SPACE to dash/steal', cx - 160, cy + 62);
  ctx.fillText('Arrow Keys to move', cx + 160, cy + 45);
  ctx.fillText('ENTER to dash/steal', cx + 160, cy + 62);

  // Egg legend
  ctx.font = '12px monospace';
  const legendY = cy + 100;
  const types = [
    ['Milk (1pt)', EGG_TYPES.milk.color],
    ['Dark (3pt)', EGG_TYPES.dark.color],
    ['Golden (5pt + speed)', EGG_TYPES.golden.color],
    ['Rotten (freeze!)', EGG_TYPES.rotten.color]
  ];
  const legendSpacing = 160;
  const legendStartX = cx - (types.length - 1) * legendSpacing / 2;
  types.forEach(([label, color], i) => {
    const lx = legendStartX + i * legendSpacing;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(lx - 40, legendY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(label, lx + 10, legendY + 4);
  });

  // Prompt
  const blink = Math.sin(time * 4) > 0;
  if (blink) {
    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = '#FFD700';
    ctx.fillText('Press any key to start!', cx, cy + 155);
  }
}

function drawGameOverScreen(time) {
  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Winner announcement
  ctx.font = 'bold 48px monospace';
  if (winner === 'tie') {
    ctx.fillStyle = '#FFD700';
    ctx.fillText("IT'S A TIE!", cx, cy - 100);
  } else {
    const w = winner === 1 ? player1 : player2;
    ctx.fillStyle = w.color;
    ctx.fillText(`PLAYER ${winner} WINS!`, cx, cy - 100);
  }

  // Scores side by side
  const colOffset = 180;
  for (const [player, offsetX] of [[player1, -colOffset], [player2, colOffset]]) {
    const px = cx + offsetX;
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = player.color;
    ctx.fillText(player === player1 ? 'P1 — Blue Bunny' : 'P2 — Red Bunny', px, cy - 40);

    ctx.font = 'bold 36px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText(`${player.score}`, px, cy + 5);
    ctx.font = '14px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('points', px, cy + 30);

    ctx.font = '13px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(`Milk: ${player.eggs.milk}  Dark: ${player.eggs.dark}  Gold: ${player.eggs.golden}`, px, cy + 55);
    ctx.fillText(`Total eggs: ${player.totalEggs}`, px, cy + 75);
  }

  // VS
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('VS', cx, cy + 5);

  // Play again
  const blink = Math.sin(time * 4) > 0;
  if (blink) {
    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = '#FFD700';
    ctx.fillText('Press any key to play again!', cx, cy + 130);
  }
}

// --- Game Flow ---
function startGame() {
  if (!audioCtx) initAudio();
  gameState = 'PLAYING';
  resetGame();
}

function endGame() {
  gameState = 'GAME_OVER';
  if (player1.score > player2.score) winner = 1;
  else if (player2.score > player1.score) winner = 2;
  else winner = 'tie';
  playSound('fanfare');

  // Reset keys to prevent instant restart
  for (const k in keys) keys[k] = false;
  // Delay restart ability
  setTimeout(() => {
    const restartHandler = (e) => {
      startGame();
      window.removeEventListener('keydown', restartHandler);
    };
    window.addEventListener('keydown', restartHandler);
  }, 1000);
}

// --- Resize ---
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Main Loop ---
createPlayers();

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // cap at 50ms
  lastTime = timestamp;

  const time = timestamp / 1000;

  if (gameState === 'PLAYING') {
    // Update timer
    gameTimer -= dt;
    if (gameTimer <= 0) {
      gameTimer = 0;
      endGame();
    }

    // Spawn eggs
    const progress = 1 - (gameTimer / GAME_DURATION);
    const spawnInterval = SPAWN_INTERVAL_START + (SPAWN_INTERVAL_END - SPAWN_INTERVAL_START) * progress;
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnEgg();
      spawnTimer = spawnInterval;
    }

    // Update players
    player1.update(dt);
    player2.update(dt);

    // Update eggs
    for (const egg of eggs) egg.update(dt);

    // Collisions
    checkCollisions();

    // Particles
    updateParticles(dt);

    // Screen effects
    if (shakeTimer > 0) shakeTimer -= dt;
    if (flashAlpha > 0) flashAlpha -= dt * 2;
  }

  // --- Draw ---
  ctx.save();

  // Camera shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity * 2;
    const sy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  if (gameState === 'START') {
    drawStartScreen(time);
  } else {
    drawArena();

    // Draw eggs
    for (const egg of eggs) egg.draw(time);

    // Draw particles
    drawParticles();

    // Draw players
    player1.draw();
    player2.draw();

    // HUD
    drawHUD(time);

    // Flash effect
    if (flashAlpha > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    if (gameState === 'GAME_OVER') {
      drawGameOverScreen(time);
    }
  }

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
